<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title{font:700 30px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#111827}
      .text{font:18px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#111827}
      .small{font:15px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#475569}
      .tiny{font:13px Arial,'Noto Sans SC','Microsoft YaHei',sans-serif;fill:#64748b}
      .panel{fill:#fff;stroke:#334155;stroke-width:2;rx:10}
      .edge{stroke:#94a3b8;stroke-width:3}
      .edgeStrong{stroke:#4f46e5;stroke-width:4}
      .edgeWeak{stroke:#cbd5e1;stroke-width:3;stroke-dasharray:8 8}
      .node{stroke:#1f2937;stroke-width:2}
      .seed{fill:#f97316}
      .candidate{fill:#6366f1}
      .excluded{fill:#e5e7eb}
      .chosen{fill:#10b981}
      .box{fill:#f8fafc;stroke:#94a3b8;stroke-width:2;rx:8}
      .arrow{stroke:#1f2937;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1120" height="560" fill="#fff"/>
  <text x="560" y="46" text-anchor="middle" class="title">一轮量子引导贪心决策示例</text>

  <rect x="44" y="80" width="535" height="405" class="panel"/>
  <text x="312" y="116" text-anchor="middle" class="text">图结构与候选集合筛选</text>

  <line x1="170" y1="205" x2="275" y2="160" class="edgeStrong"/>
  <line x1="170" y1="205" x2="280" y2="260" class="edgeStrong"/>
  <line x1="170" y1="205" x2="365" y2="210" class="edgeStrong"/>
  <line x1="275" y1="160" x2="280" y2="260" class="edgeStrong"/>
  <line x1="275" y1="160" x2="365" y2="210" class="edgeStrong"/>
  <line x1="280" y1="260" x2="365" y2="210" class="edgeStrong"/>
  <line x1="280" y1="260" x2="445" y2="292" class="edge"/>
  <line x1="365" y1="210" x2="500" y2="158" class="edgeWeak"/>

  <circle cx="170" cy="205" r="28" class="node seed"/>
  <text x="170" y="212" text-anchor="middle" class="text">1</text>
  <circle cx="275" cy="160" r="28" class="node seed"/>
  <text x="275" y="167" text-anchor="middle" class="text">2</text>
  <circle cx="280" cy="260" r="28" class="node chosen"/>
  <text x="280" y="267" text-anchor="middle" class="text">3</text>
  <circle cx="365" cy="210" r="28" class="node candidate"/>
  <text x="365" y="217" text-anchor="middle" class="text">4</text>
  <circle cx="445" cy="292" r="28" class="node candidate"/>
  <text x="445" y="299" text-anchor="middle" class="text">5</text>
  <circle cx="500" cy="158" r="25" class="node excluded"/>
  <text x="500" y="164" text-anchor="middle" class="text">6</text>
  <circle cx="500" cy="365" r="25" class="node excluded"/>
  <text x="500" y="371" text-anchor="middle" class="text">7</text>
  <line x1="445" y1="292" x2="500" y2="365" class="edgeWeak"/>

  <rect x="94" y="355" width="300" height="95" class="box"/>
  <text x="115" y="383" class="small">当前种子 S={1,2}</text>
  <text x="115" y="410" class="small">候选集合 C(S)={3,4,5}</text>
  <text x="115" y="437" class="small">本轮最终选择 v*=3</text>

  <circle cx="105" cy="512" r="9" class="node seed"/>
  <text x="122" y="518" class="tiny">种子节点</text>
  <circle cx="225" cy="512" r="9" class="node candidate"/>
  <text x="242" y="518" class="tiny">候选节点</text>
  <circle cx="345" cy="512" r="9" class="node chosen"/>
  <text x="362" y="518" class="tiny">本轮选中</text>
  <circle cx="475" cy="512" r="9" class="node excluded"/>
  <text x="492" y="518" class="tiny">不合法/未入候选</text>

  <rect x="630" y="80" width="440" height="405" class="panel"/>
  <text x="850" y="116" text-anchor="middle" class="text">候选节点评分流程</text>

  <rect x="690" y="155" width="320" height="58" class="box"/>
  <text x="850" y="190" text-anchor="middle" class="small">CTQW 得到 Q：3最高，4其次，5最低</text>
  <path d="M850 213 V250" class="arrow"/>
  <rect x="690" y="250" width="320" height="58" class="box"/>
  <text x="850" y="285" text-anchor="middle" class="small">候选子图度数 R：3连接4和5，最高</text>
  <path d="M850 308 V345" class="arrow"/>
  <rect x="690" y="345" width="320" height="72" class="box"/>
  <text x="850" y="375" text-anchor="middle" class="small">Score=0.5Q̃+0.5R̃</text>
  <text x="850" y="400" text-anchor="middle" class="small">Score(3)=1.00 &gt; Score(4)=0.23 &gt; Score(5)=0</text>

  <path d="M690 381 C585 382 420 325 306 279" class="arrow"/>
  <text x="585" y="358" text-anchor="middle" class="tiny">选择节点 3，更新 S←{1,2,3}</text>
</svg>
